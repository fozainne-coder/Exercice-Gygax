<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercice Gygax - Prénoms et stéréotypes</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      color: #333;
      padding: 1.5rem;
    }
    .container { max-width: 900px; margin: 0 auto; }
    .header { display: flex; gap: 12px; margin-bottom: 1.5rem; }
    button { padding: 10px 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; font-size: 14px; }
    .btn-active { background: #3987e5; color: white; }
    .btn-inactive { background: white; border: 1px solid #ddd; color: #333; }
    .section { display: none; background: white; border-radius: 12px; border: 1px solid #e0e0e0; padding: 1.5rem; }
    .section.active { display: block; }
    h3 { font-size: 16px; font-weight: 500; margin-bottom: 0.5rem; }
    .subtitle { font-size: 14px; color: #666; margin-bottom: 1.5rem; }
    .name-cloud { display: grid; grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); gap: 8px; padding: 1rem; background: #fafafa; border-radius: 8px; border: 1px solid #e0e0e0; min-height: 200px; margin-bottom: 1.5rem; }
    .name-badge { padding: 10px 12px; background: white; border: 2px solid #ddd; border-radius: 6px; cursor: grab; text-align: center; font-size: 13px; font-weight: 500; user-select: none; transition: 0.2s; }
    .name-badge.female { background: #e6f1fb; border-color: #3987e5; }
    .name-badge.male { background: #e1f5ee; border-color: #199e70; }
    .name-badge:active { cursor: grabbing; opacity: 0.6; }
    .couple-zones { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
    .couple-zone { border: 2px dashed #ddd; border-radius: 8px; padding: 12px; min-height: 60px; display: flex; gap: 8px; align-items: center; background: #fafafa; }
    .couple-zone.over { background: #e6f1fb; border-color: #3987e5; }
    .couple-badge { padding: 8px 10px; background: white; border: 1px solid #ddd; border-radius: 6px; font-size: 12px; font-weight: 500; }
    .close-btn { background: none; border: none; color: #e74c3c; font-size: 16px; cursor: pointer; margin-left: auto; padding: 0; }
    .controls { display: flex; gap: 8px; margin-bottom: 1.5rem; }
    .message { margin-top: 12px; font-size: 13px; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
    .stat-card { background: #fafafa; border-radius: 8px; border: 1px solid #e0e0e0; padding: 1rem; }
    .stat-label { font-size: 12px; color: #666; margin-bottom: 0.5rem; }
    .stat-value { font-size: 24px; font-weight: 500; }
    .chart-container { position: relative; height: 300px; margin-bottom: 1.5rem; }
    .recent { max-height: 300px; overflow-y: auto; font-size: 12px; font-family: monospace; }
    .recent-item { padding: 8px; border-bottom: 1px solid #e0e0e0; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <button id="modeParticipant" class="btn-active">Participant</button>
    <button id="modeProfessor" class="btn-inactive">Professor Dashboard</button>
  </div>

  <!-- PARTICIPANT -->
  <div id="participantSection" class="section active">
    <h3>Prénoms et stéréotypes de genre</h3>
    <p class="subtitle">Créez 10 couples en draggant deux prénoms dans les cases ci-dessous.</p>
    
    <label style="display: block; font-size: 12px; color: #666; text-transform: uppercase; margin-bottom: 0.75rem; font-weight: 500;">Nuage de prénoms</label>
    <div id="nameCloud" class="name-cloud"></div>

    <label style="display: block; font-size: 12px; color: #666; text-transform: uppercase; margin-bottom: 0.75rem; font-weight: 500;">Créez 10 couples</label>
    <div id="coupleZones" class="couple-zones"></div>

    <div class="controls">
      <button id="submitBtn" class="btn-active">Soumettre</button>
      <button id="resetBtn" class="btn-inactive">Réinitialiser</button>
    </div>
    <div id="message" class="message"></div>
  </div>

  <!-- PROFESSOR -->
  <div id="professorSection" class="section">
    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">Réponses reçues</div>
        <div class="stat-value" id="countResponses">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Masculin en 1er</div>
        <div class="stat-value" id="percentMale">0%</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Féminin en 1er</div>
        <div class="stat-value" id="percentFemale">0%</div>
      </div>
    </div>

    <h3>Ordre d'apparition</h3>
    <div class="chart-container">
      <canvas id="orderChart"></canvas>
    </div>

    <h3>Dernières réponses</h3>
    <div id="recentCouples" class="recent"><p style="color: #999; margin: 0;">En attente...</p></div>

    <button id="clearBtn" style="margin-top: 1.5rem; background: white; border: 1px solid #e74c3c; color: #e74c3c;">Réinitialiser les données</button>
  </div>
</div>

<script>
const femaleNames = ['Florence', 'Patricia', 'Isabelle', 'Michèle', 'Laurence', 'Sophie', 'Valérie', 'Marie', 'Caroline', 'Nadine'];
const maleNames = ['Jean', 'Marc', 'André', 'Olivier', 'Pierre', 'Denis', 'François', 'Bernard', 'Paul', 'Alain'];
const allNames = [...femaleNames, ...maleNames];

let allResponses = [];
let currentCouples = {};
let draggedName = null;
let chart = null;
let lastStats = { total: 0, male: 0, female: 0 };

function shuffle(arr) {
  const newArr = [...arr];
  for (let i = newArr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
  }
  return newArr;
}

function initParticipant() {
  const shuffled = shuffle(allNames);
  const cloudDiv = document.getElementById('nameCloud');
  cloudDiv.innerHTML = '';
  
  shuffled.forEach(name => {
    const badge = document.createElement('div');
    badge.draggable = true;
    badge.textContent = name;
    badge.classList.add('name-badge');
    badge.classList.add(femaleNames.includes(name) ? 'female' : 'male');
    
    badge.addEventListener('dragstart', (e) => {
      draggedName = name;
      badge.style.opacity = '0.5';
      e.dataTransfer.effectAllowed = 'move';
    });
    
    badge.addEventListener('dragend', () => {
      badge.style.opacity = '1';
    });
    
    cloudDiv.appendChild(badge);
  });
  
  const zonesDiv = document.getElementById('coupleZones');
  zonesDiv.innerHTML = '';
  currentCouples = {};
  
  for (let i = 0; i < 10; i++) {
    const zone = document.createElement('div');
    zone.id = `couple-${i}`;
    zone.className = 'couple-zone';
    zone.innerHTML = '<span style="color: #999; font-size: 12px;">Draggez 2 prénoms</span>';
    
    zone.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      zone.classList.add('over');
    });
    
    zone.addEventListener('dragleave', () => {
      zone.classList.remove('over');
    });
    
    zone.addEventListener('drop', (e) => {
      e.preventDefault();
      zone.classList.remove('over');
      
      if (draggedName) {
        if (!currentCouples[i]) currentCouples[i] = [];
        if (!currentCouples[i].includes(draggedName) && currentCouples[i].length < 2) {
          currentCouples[i].push(draggedName);
          updateCouple(i);
        }
      }
    });
    
    zonesDiv.appendChild(zone);
  }
}

function updateCouple(idx) {
  const zone = document.getElementById(`couple-${idx}`);
  zone.innerHTML = '';
  
  if (!currentCouples[idx] || currentCouples[idx].length === 0) {
    zone.innerHTML = '<span style="color: #999; font-size: 12px;">Draggez 2 prénoms</span>';
    return;
  }
  
  currentCouples[idx].forEach((name) => {
    const badge = document.createElement('div');
    badge.className = 'couple-badge';
    badge.textContent = name;
    zone.appendChild(badge);
  });
  
  if (currentCouples[idx].length === 2) {
    const xBtn = document.createElement('button');
    xBtn.className = 'close-btn';
    xBtn.textContent = '✕';
    xBtn.onclick = () => {
      currentCouples[idx] = [];
      updateCouple(idx);
    };
    zone.appendChild(xBtn);
  }
}

function submitResponse() {
  const couples = Object.values(currentCouples).filter(c => c.length === 2);
  if (couples.length !== 10) {
    showMessage('❌ Veuillez créer exactement 10 couples', '#e74c3c');
    return;
  }
  
  const response = { id: Date.now(), couples: [], maleFirst: 0, femaleFirst: 0 };
  couples.forEach(pair => {
    response.couples.push({ p1: pair[0], p2: pair[1] });
    if (maleNames.includes(pair[0])) response.maleFirst++;
    if (femaleNames.includes(pair[0])) response.femaleFirst++;
  });
  
  allResponses.push(response);
  localStorage.setItem('gygax_responses', JSON.stringify(allResponses));
  
  showMessage('✓ Réponse enregistrée !', '#27ae60');
  setTimeout(() => {
    initParticipant();
  }, 2000);
  
  lastStats = { total: 0, male: 0, female: 0 };
  updateDashboard();
}

function showMessage(text, color) {
  const msg = document.getElementById('message');
  msg.textContent = text;
  msg.style.color = color;
}

function loadData() {
  try {
    const stored = localStorage.getItem('gygax_responses');
    if (stored) allResponses = JSON.parse(stored);
  } catch (e) {
    console.error('Error:', e);
  }
}

function updateDashboard() {
  const total = allResponses.length;
  const maleFirst = allResponses.reduce((sum, r) => sum + r.maleFirst, 0);
  const femaleFirst = allResponses.reduce((sum, r) => sum + r.femaleFirst, 0);
  const totalCouples = maleFirst + femaleFirst;

  document.getElementById('countResponses').textContent = total;
  document.getElementById('percentMale').textContent = totalCouples ? Math.round((maleFirst / totalCouples) * 100) + '%' : '0%';
  document.getElementById('percentFemale').textContent = totalCouples ? Math.round((femaleFirst / totalCouples) * 100) + '%' : '0%';

  // Redessiner le graphique seulement si les données ont changé
  if (lastStats.total !== total || lastStats.male !== maleFirst || lastStats.female !== femaleFirst) {
    updateChart(maleFirst, femaleFirst);
    lastStats = { total, male: maleFirst, female: femaleFirst };
  }
  
  updateRecentCouples();
}

function updateChart(maleFirst, femaleFirst) {
  const ctx = document.getElementById('orderChart');
  if (!ctx) return;
  if (chart) chart.destroy();
  
  chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['Masculin en 1er', 'Féminin en 1er'],
      datasets: [{
        label: 'Nombre de couples',
        data: [maleFirst, femaleFirst],
        backgroundColor: ['#3987e5', '#199e70'],
        borderRadius: 4
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: { y: { beginAtZero: true } }
    }
  });
}

function updateRecentCouples() {
  const recent = allResponses.slice(-10).reverse();
  const html = recent.length ? recent.map(r => 
    `<div class="recent-item">${r.couples.map(c => c.p1 + '-' + c.p2).join(', ')}</div>`
  ).join('') : '<p style="color: #999; margin: 0;">En attente...</p>';
  document.getElementById('recentCouples').innerHTML = html;
}

document.getElementById('modeParticipant').onclick = () => {
  document.getElementById('participantSection').classList.add('active');
  document.getElementById('professorSection').classList.remove('active');
  document.getElementById('modeParticipant').classList.add('btn-active');
  document.getElementById('modeParticipant').classList.remove('btn-inactive');
  document.getElementById('modeProfessor').classList.remove('btn-active');
  document.getElementById('modeProfessor').classList.add('btn-inactive');
};

document.getElementById('modeProfessor').onclick = () => {
  document.getElementById('participantSection').classList.remove('active');
  document.getElementById('professorSection').classList.add('active');
  document.getElementById('modeParticipant').classList.remove('btn-active');
  document.getElementById('modeParticipant').classList.add('btn-inactive');
  document.getElementById('modeProfessor').classList.add('btn-active');
  document.getElementById('modeProfessor').classList.remove('btn-inactive');
  updateDashboard();
};

document.getElementById('submitBtn').onclick = submitResponse;
document.getElementById('resetBtn').onclick = () => { initParticipant(); document.getElementById('message').textContent = ''; };
document.getElementById('clearBtn').onclick = () => {
  if (confirm('Réinitialiser toutes les données ?')) {
    allResponses = [];
    localStorage.removeItem('gygax_responses');
    lastStats = { total: 0, male: 0, female: 0 };
    updateDashboard();
  }
};

loadData();
initParticipant();
setInterval(() => {
  if (document.getElementById('professorSection').classList.contains('active')) {
    loadData();
    updateDashboard();
  }
}, 2000);
</script>
</body>
</html>
